name: accessally_ai
description: AccessAlly AI - Disability Admission Assistant for Indian Higher Education
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  google_fonts: ^6.1.0
  flutter_markdown: ^0.7.4
  file_picker: ^8.0.0
  http: ^1.2.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  uuid: ^4.3.3
  syncfusion_flutter_pdf: ^33.2.12   # ← upgraded to fix intl conflict
  archive: ^3.6.1
  excel: ^4.0.6
  path: ^1.9.0
  image_picker: ^1.1.2
  flutter_widget_from_html_core: ^0.15.1   # DOCX HTML rendering
  flutter_pdfview: ^1.3.2    # native PDF rendering
  path_provider: ^2.1.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/